
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Table Generator</title>
    <link rel="stylesheet" href="SaraRouane_Assignment1.css">
    <script defer src="SaraRouane_Assignment1.js"></script>
</head>
<body>
    <header>
        <h1>Dynamic Table Generator</h1>
    </header>
    <main>
        <form id="tableForm">
            <label for="rows">Number of Rows:</label>
            <input type="number" id="rows" name="rows" min="1" required>

            <label for="columns">Number of Columns:</label>
            <input type="number" id="columns" name="columns" min="1" required>

            <button onclick="processSubmit(event)" type="submit">Submit</button>
        </form>

        <div id="tableContainer"></div>
    </main>
    <footer>
        <p>&copy; 2025 Sara Rouane. All rights reserved.</p>
    </footer>
</body>
</html>
